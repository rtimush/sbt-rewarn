name: CI

on:
  push:
    branches: [ master ]
    tags: [ '*.*.*' ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { sbt: 1_x, java: 8 }
          - { sbt: 2_x, java: 17 }
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/cache@v6
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier/v1
            ~/.ivy2/cache
          key: ${{ runner.os }}-build-cache-${{ matrix.sbt }}-${{ hashFiles('*.sbt') }}-${{ hashFiles('project/*') }}
      - uses: actions/setup-java@v5
        with:
          java-version: "${{ matrix.java }}"
          distribution: zulu
      - uses: sbt/setup-sbt@v1
      - run: sbt scalafmtCheckAll scalafmtSbtCheck sbt-rewarn-${{ matrix.sbt }}/test sbt-rewarn-${{ matrix.sbt }}/publishLocal
      - uses: actions/upload-artifact@v7
        with:
          name: sbt-rewarn-build-${{ matrix.sbt }}
          path: /home/runner/.ivy2/local
  scripted:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        include:
          - { sbt: 1_0_0,       java: 8  }
          - { sbt: 1_1_0,       java: 8  }
          - { sbt: 1_2_0,       java: 8  }
          - { sbt: 1_3_13,      java: 8  }
          - { sbt: 1_latest,    java: 8  }
          - { sbt: 1_3_13,      java: 11 }
          - { sbt: 1_latest,    java: 11 }
          - { sbt: 1_latest,    java: 21 }
          - { sbt: 1_latest,    java: 25 }
          - { sbt: 2_0_0,       java: 17 }
          - { sbt: 2_0_0,       java: 21 }
          - { sbt: 2_0_0,       java: 25 }
      fail-fast: false
    name: test (java ${{ matrix.java }}, sbt ${{ matrix.sbt }})
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/cache@v6
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier/v1
            ~/.ivy2/cache
          key: ${{ runner.os }}-scripted-cache-${{ matrix.sbt }}-${{ hashFiles('*.sbt') }}-${{ hashFiles('project/*') }}
      - uses: actions/download-artifact@v8
        with:
          pattern: sbt-rewarn-build-*
          merge-multiple: true
          path: /home/runner/.ivy2/local
      - uses: actions/setup-java@v5
        with:
          java-version: "${{ matrix.java }}"
          distribution: zulu
      - uses: sbt/setup-sbt@v1
      - run: sbt sbt-rewarn-${{ matrix.sbt }}/scripted
        env:
          CI: true
  test:
    runs-on: ubuntu-latest
    needs: scripted
    steps:
      - run: "true"
  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.repository == 'rtimush/sbt-rewarn' && ( github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/') )
    strategy:
      matrix:
        include:
          - { sbt: 1_x, java: 8 }
          - { sbt: 2_x, java: 17 }
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/cache@v6
        with:
          path: |
            ~/.sbt
            ~/.cache/coursier/v1
            ~/.ivy2/cache
          key: ${{ runner.os }}-publish-cache-${{ matrix.sbt }}-${{ hashFiles('*.sbt') }}-${{ hashFiles('project/*') }}
      - uses: crazy-max/ghaction-import-gpg@v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PRIVATE_KEY_PASSPHRASE }}
      - uses: actions/setup-java@v5
        with:
          java-version: "${{ matrix.java }}"
          distribution: zulu
      - uses: sbt/setup-sbt@v1
      - run: sbt sbt-rewarn-${{ matrix.sbt }}/publishSigned
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      - if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v7
        with:
          name: sbt-rewarn-stage-${{ matrix.sbt }}
          path: target/sona-staging
  release:
    runs-on: ubuntu-latest
    needs: publish
    if: github.repository == 'rtimush/sbt-rewarn' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          pattern: sbt-rewarn-stage-*
          merge-multiple: true
          path: target/sona-staging
      - run: sbt sonaRelease
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
